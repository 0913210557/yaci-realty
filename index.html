<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房產好夥伴雅慈｜桃園在地房仲品牌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F5F1E8;
    --cream-deep:#ECE4D2;
    --paper:#FBF9F4;
    --ink:#2B2621;
    --ink-soft:#5C554A;
    --ink-faint:#8A8171;
    --pine:#2F4B3C;
    --pine-dark:#203528;
    --brass:#A67C42;
    --brass-light:#C9A971;
    --line:#06C755;
    --line-dark:#05a648;
    --border:#DED2B7;
    --radius:14px;
    --shadow:0 10px 30px -12px rgba(43,38,33,0.18);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    padding-bottom:66px; /* space for sticky mobile bar */
  }
  h1,h2,h3{ font-family:'Noto Serif TC', serif; color:var(--ink); line-height:1.35; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  a{ color:inherit; text-decoration:none; }
  img{max-width:100%; display:block;}
  .wrap{ max-width:1120px; margin:0 auto; padding:0 20px; }
  .visually-hidden{ position:absolute; width:1px;height:1px; overflow:hidden; clip:rect(0 0 0 0); }

  /* ---------- Home-plate signature shape ---------- */
  .badge-home{
    clip-path: polygon(50% 0%, 100% 38%, 100% 100%, 0% 100%, 0% 38%);
  }

  /* ---------- Roofline divider (signature motif) ---------- */
  .roofline{
    width:100%; height:34px;
    background-repeat: repeat-x;
    background-size: 120px 34px;
    background-image: linear-gradient(135deg, transparent 49%, currentColor 49%, currentColor 51%, transparent 51%),
                       linear-gradient(-135deg, transparent 49%, currentColor 49%, currentColor 51%, transparent 51%);
    background-position: 0 0, 60px 0;
    color: var(--brass-light);
    opacity:.55;
  }
  .roofline.flip{ transform: scaleY(-1); }

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 22px; border-radius:999px; font-weight:700; font-size:15px;
    border:1.5px solid transparent; cursor:pointer; white-space:nowrap;
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn-line{ background:var(--line); color:#fff; box-shadow:0 8px 20px -8px rgba(6,199,85,.55); }
  .btn-line:hover{ background:var(--line-dark); }
  .btn-outline{ background:transparent; border-color:var(--pine); color:var(--pine); }
  .btn-outline:hover{ background:var(--pine); color:var(--paper); }
  .btn-ghost{ background:var(--paper); color:var(--ink); border-color:var(--border); }
  .btn-block{ width:100%; }

  /* ---------- Header ---------- */
  header.site{
    position:sticky; top:0; z-index:50;
    background:rgba(245,241,232,.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
  }
  .header-inner{ display:flex; align-items:center; justify-content:space-between; padding:14px 20px; }
  .brand{ display:flex; flex-direction:column; line-height:1.1; }
  .brand .zh{ font-family:'Noto Serif TC',serif; font-weight:900; font-size:22px; color:var(--pine-dark); letter-spacing:.04em; }
  .brand .en{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.18em; color:var(--brass); text-transform:uppercase; margin-top:2px;}
  nav.desktop{ display:none; gap:28px; font-weight:500; font-size:15px; }
  .header-actions{ display:flex; align-items:center; gap:10px; }
  .icon-btn{ width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); background:var(--paper); }
  .menu-toggle{ display:flex; }
  .menu-toggle span, .menu-toggle span::before, .menu-toggle span::after{
    content:''; display:block; width:18px; height:2px; background:var(--ink); position:relative; transition:.2s;
  }
  .menu-toggle span::before{ position:absolute; top:-6px; }
  .menu-toggle span::after{ position:absolute; top:6px; }
  .menu-toggle.open span{ background:transparent; }
  .menu-toggle.open span::before{ top:0; transform:rotate(45deg); background:var(--ink); }
  .menu-toggle.open span::after{ top:0; transform:rotate(-45deg); background:var(--ink); }

  .mobile-nav{
    position:fixed; inset:0; top:65px; background:var(--cream);
    display:flex; flex-direction:column; padding:30px 24px; gap:6px;
    transform:translateX(100%); transition:transform .28s ease; z-index:40;
  }
  .mobile-nav.open{ transform:translateX(0); }
  .mobile-nav a{ font-family:'Noto Serif TC',serif; font-size:22px; font-weight:700; padding:14px 0; border-bottom:1px solid var(--border); }
  .mobile-nav .line-cta{ margin-top:20px; }

  /* ---------- Hero ---------- */
  .hero{
    background: radial-gradient(ellipse at 20% 0%, var(--cream-deep), var(--cream) 60%);
    padding:36px 0 0;
    position:relative;
  }
  .hero-inner{ padding:10px 20px 40px; }
  .eyebrow{ display:inline-flex; align-items:center; gap:8px; font-size:12px; letter-spacing:.14em; color:var(--pine); font-weight:700; text-transform:uppercase; margin-bottom:18px; }
  .eyebrow .dot{ width:9px; height:9px; background:var(--brass); }
  .hero h1{ font-size:34px; font-weight:900; letter-spacing:.02em; margin-bottom:18px; }
  .hero h1 em{ font-style:normal; color:var(--pine); border-bottom:4px solid var(--brass-light); }
  .hero p.lead{ color:var(--ink-soft); font-size:16px; max-width:46ch; margin-bottom:28px; }
  .hero-ctas{ display:flex; flex-direction:column; gap:12px; margin-bottom:34px; }
  .stat-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat-chip{ background:var(--paper); border:1px solid var(--border); border-radius:12px; padding:14px 10px; text-align:center; }
  .stat-chip .num{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:20px; color:var(--pine-dark); }
  .stat-chip .label{ font-size:11px; color:var(--ink-faint); margin-top:4px; }

  /* ---------- Sections generic ---------- */
  section{ padding:56px 0; }
  .section-head{ margin-bottom:32px; }
  .section-head .eyebrow{ margin-bottom:10px; }
  .section-head h2{ font-size:26px; font-weight:900; }
  .section-head p{ color:var(--ink-soft); margin-top:10px; max-width:56ch; }
  .alt-bg{ background:var(--cream-deep); }

  /* reveal on scroll */
  .reveal{ opacity:0; transform:translateY(18px); transition:opacity .6s ease, transform .6s ease; }
  .reveal.in{ opacity:1; transform:translateY(0); }

  /* ---------- Services ---------- */
  .service-grid{ display:grid; grid-template-columns:1fr; gap:16px; }
  .service-card{ background:var(--paper); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
  .service-icon{ width:52px; height:52px; background:var(--pine); color:#fff; display:flex; align-items:center; justify-content:center; margin-bottom:16px; }
  .service-card h3{ font-size:18px; margin-bottom:8px; }
  .service-card p{ color:var(--ink-soft); font-size:14.5px; }

  /* ---------- Case studies (horizontal snap) ---------- */
  .case-scroll{ display:flex; gap:16px; overflow-x:auto; padding:6px 20px 20px; scroll-snap-type:x mandatory; margin:0 -20px; -webkit-overflow-scrolling:touch;}
  .case-scroll::-webkit-scrollbar{ height:6px; }
  .case-scroll::-webkit-scrollbar-thumb{ background:var(--border); border-radius:99px; }
  .case-card{ flex:0 0 82%; scroll-snap-align:start; background:var(--paper); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
  .case-media{ height:150px; background:linear-gradient(135deg, var(--pine) 0%, var(--pine-dark) 100%); position:relative; }
  .case-media .tag{ position:absolute; top:12px; left:12px; background:var(--brass); color:#fff; font-size:11px; font-weight:700; padding:5px 10px; border-radius:99px; }
  .case-media svg{ position:absolute; bottom:0; left:0; width:100%; opacity:.5; }
  .case-body{ padding:18px 20px 22px; }
  .case-body .region{ font-size:12px; color:var(--brass); font-weight:700; letter-spacing:.06em; margin-bottom:6px; }
  .case-body h3{ font-size:17px; margin-bottom:10px; }
  .case-body p{ font-size:14px; color:var(--ink-soft); }

  /* ---------- Video ---------- */
  .video-feature{ position:relative; border-radius:var(--radius); overflow:hidden; background:linear-gradient(135deg,#3a3128,#20180f); aspect-ratio:16/10; margin-bottom:16px; display:flex; align-items:flex-end; }
  .video-feature .play{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:64px; height:64px; background:var(--paper); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 25px rgba(0,0,0,.35); }
  .video-feature .meta{ position:relative; z-index:2; padding:20px; color:#fff; }
  .video-feature .meta .dur{ font-family:'JetBrains Mono',monospace; font-size:12px; background:rgba(0,0,0,.5); padding:3px 8px; border-radius:6px; margin-bottom:8px; display:inline-block; }
  .video-feature .meta h3{ color:#fff; font-size:19px; }
  .video-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .video-thumb{ border-radius:12px; overflow:hidden; background:linear-gradient(135deg,#4b5d4f,#2f4b3c); aspect-ratio:16/10; position:relative; }
  .video-thumb .play-sm{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:36px; height:36px; background:rgba(255,255,255,.92); display:flex; align-items:center; justify-content:center; }
  .vid
